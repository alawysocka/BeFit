<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - BeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">BeFit</a>
            <div class="collapse navbar-collapse d-flex justify-content-between">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item d-none" id="admin-panel-link">
                        <a class="nav-link" href="admin.html">Panel Administratora</a>
                    </li>
                </ul>
                <div id="guest-links" class="d-flex">
                    <a class="btn btn-outline-light me-2" href="login.html">Logowanie</a>
                    <a class="btn btn-light" href="register.html">Rejestracja</a>
                </div>
                <div id="user-links" class="d-none align-items-center">
                    <span class="text-light me-3" id="user-name-display"></span>
                    <button id="logout-btn" class="btn btn-danger btn-sm">Wyloguj</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-4 col-sm-8 col-12 shadow p-4 rounded bg-white">
            <h2 class="text-center mb-4">Rejestracja</h2>
            <div id="regAlerts"></div>
            <form id="registerForm">
                <input type="text" id="regFirstName" class="form-control mb-2" placeholder="Imię" required>
                <input type="text" id="regLastName" class="form-control mb-2" placeholder="Nazwisko" required>
                <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" required>
                <input type="password" id="regPassword" class="form-control mb-2" placeholder="Hasło" required>
                <input type="password" id="regConfirmPassword" class="form-control mb-3" placeholder="Powtórz hasło" required>
                <button type="submit" id="regBtn" class="btn btn-success w-100">Utwórz konto</button>
            </form>
        </div>
        <script src="app.js"></script>
</body>
</html>
