<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - BeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">BeFit Admin</a>
            <div class="d-flex">
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Wyloguj</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Zarządzanie listą trenerów</h2>
        <p class="text-muted">Dodaj adres e-mail trenera. Kiedy założy konto, system automatycznie nada mu odpowiednie uprawnienia.</p>

        <div class="row mb-4">
            <div class="col-md-6">
                <div id="adminAlerts"></div>
                <form id="addTrainerForm" class="d-flex">
                    <input type="email" id="newTrainerEmail" class="form-control me-2" placeholder="Adres e-mail trenera" required>
                    <button type="submit" id="addTrainerBtn" class="btn btn-success">Dodaj</button>
                </form>
            </div>
        </div>

        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Autoryzowane adresy e-mail (Trenerzy)</th>
                </tr>
            </thead>
            <tbody id="whitelistBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', function () {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });


        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
