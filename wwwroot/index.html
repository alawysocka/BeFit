<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">BeFit</a>
            <div class="collapse navbar-collapse d-flex justify-content-between">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item d-none" id="admin-panel-link">
                        <a class="nav-link" href="admin.html">Panel Administratora</a>
                    </li>
                    <li class="nav-item d-none" id="trainer-panel-link">
                        <a class="nav-link text-warning fw-bold" href="trainer.html">Panel Trenera</a>
                    </li>
                    <li class="nav-item d-none" id="participant-panel-link">
                        <a class="nav-link text-success fw-bold" href="participant.html">Moje Rezerwacje</a>
                    </li>
                </ul>
                <div id="guest-links" class="d-flex">
                    <a class="btn btn-outline-light me-2" href="login.html">Logowanie</a>
                    <a class="btn btn-light" href="register.html">Rejestracja</a>
                </div>
                <div id="user-links" class="d-none align-items-center">
                    <span class="text-light me-3" id="user-name-display"></span>
                    <button id="logout-btn" class="btn btn-danger btn-sm">Wyloguj</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">Dołącz do naszych treningów</h1>
            <p class="lead text-muted">Sprawdź nadchodzące zajęcia i znajdź coś dla siebie.</p>
        </div>

        <div id="indexAlerts"></div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Zajęcia</th>
                            <th>Prowadzący</th>
                            <th>Data</th>
                            <th>Godzina</th>
                            <th>Dostępność</th>
                            <th>Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="publicScheduleBody">
                        <tr><td colspan="5" class="text-center text-muted py-4">Pobieranie grafiku z serwera...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
